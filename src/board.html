<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoffner Dispatch Board</title>
<style>
  :root {
    --ink: #2A3444;
    --muted: #7A8699;
    --bg: #F5F6F8;
    --line: #E1E6EC;
    --orange: #E8862E;
    --blue: #3B7DC4;
    --purple: #8055C4;
    --green: #2F8A3C;
    --red: #C94040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    padding-bottom: 60px;
  }
  header {
    background: #1C2634;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--orange);
  }
  h1 { font-size: 17px; letter-spacing: 0.12em; font-weight: 800; }
  .subtitle { font-size: 12px; color: #9AA7B8; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  #updated { font-size: 12px; color: #9AA7B8; }
  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #4C9A55; margin-right: 5px; animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #refresh-btn {
    background: var(--orange); color: #1C2634; border: none; border-radius: 6px;
    padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  #refresh-btn:disabled { opacity: 0.6; }

  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 20px 0;
  }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab {
    border: 1px solid #D5DBE3; border-radius: 18px; padding: 6px 13px;
    font-size: 13px; font-weight: 700; cursor: pointer; background: #fff; color: var(--ink);
  }
  .tab.active { color: #fff; border-color: transparent; }
  #search {
    flex: 1 1 200px; max-width: 340px; padding: 8px 12px; border-radius: 6px;
    border: 1px solid #D5DBE3; font-size: 14px; outline: none; background: #fff;
  }
  #search:focus { border-color: var(--blue); }

  .error-box {
    margin: 20px; background: #FDEBEB; border: 1px solid var(--red);
    border-radius: 8px; padding: 14px 16px; color: #7E1D1D; font-size: 14px;
  }
  .loading-box { padding: 48px 20px; text-align: center; }
  .pulse-bar {
    display: inline-block; width: 10px; height: 34px; margin: 0 4px; border-radius: 3px;
    background: linear-gradient(var(--orange), var(--blue));
    animation: pulse 0.9s ease-in-out infinite;
  }
  .pulse-bar:nth-child(2) { animation-delay: 0.15s; }
  .pulse-bar:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) { .pulse-bar, .live-dot { animation: none; } }

  .lane { margin: 18px 20px 0; }
  .lane-header {
    display: flex; align-items: baseline; gap: 10px;
    padding: 0 0 6px 10px; border-left: 5px solid;
  }
  .lane-title { font-size: 15px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; }
  .lane-count { font-size: 13px; font-weight: 700; color: var(--muted); }
  .lane-empty { color: #9AA7B8; font-size: 13px; padding: 8px 0 0 12px; }

  .bucket { margin-top: 10px; }
  .bucket-title {
    font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 6px 6px 0 0;
  }
  .rows { background: #fff; border: 1px solid var(--line); border-radius: 0 0 8px 8px; }
  .row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 12px; border-top: 1px solid #F0F2F5;
  }
  .row:first-child { border-top: none; }
  .row.priority { border-left: 4px solid var(--red); background: #FFF8F8; }
  .row-main { flex: 1 1 240px; min-width: 0; }
  .client { font-size: 14px; font-weight: 700; }
  .addr { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .row-tech {
    flex: 0 0 auto; font-size: 13px; font-weight: 700; color: var(--ink);
    background: #F1F3F6; border-radius: 5px; padding: 4px 10px; white-space: nowrap;
  }
  .row-tech.none { color: var(--red); background: #FDEBEB; }
  .row-money { flex: 0 0 78px; text-align: right; font-size: 14px; font-weight: 800; color: var(--green); }
  .row-money.zero { color: #B8C0CC; font-weight: 600; }
  .row-due { flex: 0 0 auto; font-size: 12px; font-weight: 800; color: var(--red); white-space: nowrap; }
  .row-date { flex: 0 0 auto; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .row-num { flex: 0 0 auto; font-size: 11px; color: #B8C0CC; white-space: nowrap; }
  .old-badge { font-size: 11px; font-weight: 700; background: #FDEBEB; color: var(--red); border-radius: 10px; padding: 2px 8px; }
  .pri-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.06em; background: var(--red); color: #fff; border-radius: 4px; padding: 2px 7px; }
  .status-note { font-size: 11px; font-weight: 700; color: var(--muted); }

  /* Techs tab */
  .stats-wrap { margin: 18px 20px 0; overflow-x: auto; }
  table.stats {
    width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    font-size: 13px;
  }
  table.stats th {
    text-align: left; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); background: #F1F3F6; padding: 9px 12px; white-space: nowrap;
  }
  table.stats td { padding: 9px 12px; border-top: 1px solid #F0F2F5; white-space: nowrap; }
  table.stats td.num { text-align: right; font-weight: 700; }
  table.stats td.tech-name { font-weight: 800; }
  table.stats td .warn { color: var(--red); }
  .stats-note { font-size: 11px; color: var(--muted); margin: 6px 2px 0; }

  .tech-section { margin: 18px 20px 0; }
  .tech-header {
    display: flex; align-items: baseline; gap: 10px;
    padding: 0 0 6px 10px; border-left: 5px solid var(--orange);
  }
  .tech-title { font-size: 15px; font-weight: 800; }
  .tech-sub { font-size: 12px; color: var(--muted); }

  footer { text-align: center; font-size: 12px; color: #9AA7B8; margin-top: 40px; }

  @media (max-width: 560px) {
    .row { gap: 8px; }
    .row-money { flex-basis: 64px; }
    .row-num { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>HOFFNER DISPATCH</h1>
    <p class="subtitle">Live from Workiz &middot; auto-refreshes every 60s</p>
  </div>
  <div class="header-right">
    <span id="updated"></span>
    <button id="refresh-btn">Refresh</button>
  </div>
</header>

<div class="toolbar">
  <div class="tabs" id="tabs"></div>
  <input type="text" id="search" placeholder="Search name, address, tech&hellip;" />
</div>

<div id="content"></div>

<footer>Done jobs hidden on lane views &middot; Tech stats cover Service Calls only (repairs &amp; tune-ups)</footer>

<script>
// ==== RULES — tune to match your Workiz setup ====
const PROJECT_CLIENTS = ["paramount", "ward"];
const PROJECT_TYPE_KEYWORDS = ["new construction", "construction", "commercial", "project"];
const INSTALL_TYPE_KEYWORDS = ["install", "replacement", "new system", "changeout", "change out"];
const IN_PROGRESS_STATUSES = ["in progress"];
const SCHEDULED_STATUSES = ["scheduled", "submitted"];
const FINISHED_STATUSES = ["done", "completed", "canceled", "cancelled"];
const CANCELED_STATUSES = ["canceled", "cancelled"];
const FOLLOWUP_TAGS = ["followed up", "follow up done", "followup"];
const PRIORITY_DAYS = 30;    // unpaid + this old + no follow-up tag = PRIORITY
const STATS_WINDOW_DAYS = 30; // jobs run / avg ticket lookback
// =================================================

const LANES = {
  service:  { label: "Service Calls", accent: "#E8862E", soft: "#FFF4E5", dark: "#8A4A00" },
  installs: { label: "Installs", accent: "#3B7DC4", soft: "#EAF2FB", dark: "#1D4E7E" },
  projects: { label: "Projects", accent: "#8055C4", soft: "#F3ECFB", dark: "#4A2A80" },
};

let allJobs = [];
let activeLane = "all";
let firstLoad = true;

// ---- field helpers ----
function f(job) {
  for (let i = 1; i < arguments.length; i++) {
    const n = arguments[i];
    if (job[n] !== undefined && job[n] !== null && job[n] !== "") return job[n];
    const lower = n.toLowerCase();
    for (const k of Object.keys(job)) {
      if (k.toLowerCase() === lower && job[k] !== null && job[k] !== "") return job[k];
    }
  }
  return "";
}
const jobStatus = (j) => String(f(j, "Status", "SubStatus") || "Unknown").trim();
function clientName(j) {
  const company = f(j, "Company", "CompanyName");
  const person = [f(j, "FirstName"), f(j, "LastName")].filter(Boolean).join(" ");
  if (company && person) return person + " \u2014 " + company;
  return person || company || f(j, "ClientName", "Name") || "Unknown client";
}
const jobAddress = (j) => [f(j, "Address"), f(j, "City")].filter(Boolean).join(", ");
function techList(j) {
  const team = f(j, "Team");
  if (Array.isArray(team)) {
    return team.map(t => typeof t === "string" ? t : (t && (t.Name || t.name)) || "").filter(Boolean);
  }
  const single = f(j, "Tech", "AssignedTo");
  return single ? [String(single)] : [];
}
const techNames = (j) => techList(j).join(", ");
function money(j) {
  const n = parseFloat(f(j, "JobTotalPrice", "TotalPrice", "Total", "SubTotal"));
  return isNaN(n) ? null : n;
}
function amountDue(j) {
  const n = parseFloat(f(j, "JobAmountDue", "AmountDue", "Due", "Balance"));
  return isNaN(n) ? 0 : n;
}
function jobTags(j) {
  const raw = f(j, "Tags", "JobTags");
  let list = [];
  if (Array.isArray(raw)) list = raw.map(t => typeof t === "string" ? t : (t && (t.Name || t.name || t.tag)) || "");
  else if (typeof raw === "string") list = raw.split(",");
  return list.map(t => String(t).toLowerCase().trim()).filter(Boolean);
}
const hasFollowUp = (j) => jobTags(j).some(t => FOLLOWUP_TAGS.includes(t));
function fmtMoney(n) {
  if (n === null) return "\u2014";
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function formatDate(raw) {
  if (!raw) return "";
  const d = new Date(raw);
  if (isNaN(d.getTime())) return String(raw);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function daysAgo(raw) {
  if (!raw) return null;
  const d = new Date(raw);
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}
const jobDate = (j) => f(j, "JobDateTime", "CreatedDate");

// ---- classification ----
function classifyLane(job) {
  const name = clientName(job).toLowerCase();
  const type = String(f(job, "JobType")).toLowerCase();
  if (PROJECT_CLIENTS.some(c => name.includes(c)) || PROJECT_TYPE_KEYWORDS.some(k => type.includes(k))) return "projects";
  if (INSTALL_TYPE_KEYWORDS.some(k => type.includes(k))) return "installs";
  return "service";
}
const isFinished = (j) => FINISHED_STATUSES.includes(jobStatus(j).toLowerCase());
const isCanceled = (j) => CANCELED_STATUSES.includes(jobStatus(j).toLowerCase());
const isDone = (j) => isFinished(j) && !isCanceled(j);
function bucketOf(j) {
  const s = jobStatus(j).toLowerCase();
  if (IN_PROGRESS_STATUSES.includes(s)) return "inprogress";
  if (SCHEDULED_STATUSES.includes(s)) return "scheduled";
  return "open";
}
function isPriority(j) {
  const age = daysAgo(jobDate(j));
  return age !== null && age >= PRIORITY_DAYS && amountDue(j) > 0 && !hasFollowUp(j);
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ---- fetch ----
async function loadJobs(silent) {
  const btn = document.getElementById("refresh-btn");
  if (!silent) {
    btn.disabled = true;
    btn.textContent = "Refreshing\u2026";
    if (firstLoad) {
      document.getElementById("content").innerHTML =
        '<div class="loading-box"><span class="pulse-bar"></span><span class="pulse-bar"></span><span class="pulse-bar"></span>' +
        '<p style="color:#7A8699;margin-top:14px;font-size:14px">Pulling live from Workiz\u2026</p></div>';
    }
  }
  try {
    const res = await fetch("https://workiz-mcp-server.onrender.com/api/jobs");
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch (e) {}
      throw new Error("Server returned " + res.status + ". " + detail);
    }
    const body = await res.json();
    const jobs = Array.isArray(body.jobs) ? body.jobs : (Array.isArray(body.data) ? body.data : []);
    if (jobs.length === 0) throw new Error("The server responded but returned zero jobs.");
    allJobs = jobs;
    firstLoad = false;
    const now = new Date();
    document.getElementById("updated").innerHTML =
      '<span class="live-dot"></span>Live \u00b7 ' +
      now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    render();
  } catch (err) {
    if (!silent || firstLoad) {
      document.getElementById("content").innerHTML =
        '<div class="error-box"><strong>Couldn\u2019t load the board.</strong> ' + esc(err.message) + '</div>';
    }
  } finally {
    btn.disabled = false;
    btn.textContent = "Refresh";
  }
}

// ---- shared row ----
function rowHtml(job, opts) {
  opts = opts || {};
  const tech = techNames(job);
  const amt = money(job);
  const due = amountDue(job);
  const created = jobDate(job);
  const age = daysAgo(created);
  const status = jobStatus(job);
  const pri = opts.checkPriority && isPriority(job);

  return '<div class="row' + (pri ? ' priority' : '') + '">' +
    '<div class="row-main">' +
      '<div class="client">' + (pri ? '<span class="pri-badge">PRIORITY</span> ' : '') + esc(clientName(job)) + '</div>' +
      '<div class="addr">' + esc(jobAddress(job)) +
        (opts.showStatus ? ' &middot; <span class="status-note">' + esc(status) + '</span>' : '') +
      '</div>' +
    '</div>' +
    (opts.hideTech ? '' :
      (tech
        ? '<span class="row-tech">' + esc(tech) + '</span>'
        : '<span class="row-tech none">Unassigned</span>')) +
    '<span class="row-money' + (amt === null || amt === 0 ? ' zero' : '') + '">' + fmtMoney(amt) + '</span>' +
    (due > 0 ? '<span class="row-due">due ' + fmtMoney(due) + '</span>' : '') +
    '<span class="row-date">' + esc(formatDate(created)) +
      (age !== null && age > 14 && !isFinished(job) ? ' <span class="old-badge">' + age + 'd</span>' : '') +
    '</span>' +
    '<span class="row-num">#' + esc(f(job, "SerialId", "JobId", "UUID")) + '</span>' +
  '</div>';
}

// ---- lane view ----
const BUCKETS = [
  { key: "inprogress", label: "In Progress", color: "#2F8A3C", bg: "#EDF7EE" },
  { key: "scheduled",  label: "Scheduled",   color: "#1D4E7E", bg: "#EAF2FB" },
  { key: "open",       label: "Still Open",  color: "#7E1D1D", bg: "#FDEBEB" },
];

function matchesSearch(j, search) {
  if (!search) return true;
  const hay = [clientName(j), jobAddress(j), jobStatus(j), techNames(j),
    String(f(j, "SerialId", "UUID", "JobId")), String(f(j, "JobType"))
  ].join(" ").toLowerCase();
  return hay.includes(search);
}

function renderLanes(search) {
  let visible = allJobs.filter(j => !isFinished(j) && matchesSearch(j, search));

  const board = {
    service:  { inprogress: [], scheduled: [], open: [] },
    installs: { inprogress: [], scheduled: [], open: [] },
    projects: { inprogress: [], scheduled: [], open: [] },
  };
  for (const job of visible) board[classifyLane(job)][bucketOf(job)].push(job);
  const byDate = (a, z) => new Date(jobDate(a) || 0) - new Date(jobDate(z) || 0);
  for (const lane of Object.values(board)) for (const list of Object.values(lane)) list.sort(byDate);

  const laneKeys = activeLane === "all" ? ["service", "installs", "projects"] : [activeLane];
  let html = "";

  for (const key of laneKeys) {
    const lane = LANES[key];
    const total = board[key].inprogress.length + board[key].scheduled.length + board[key].open.length;

    html += '<section class="lane">' +
      '<div class="lane-header" style="border-color:' + lane.accent + '">' +
        '<span class="lane-title" style="color:' + lane.dark + '">' + lane.label + '</span>' +
        '<span class="lane-count">' + total + '</span>' +
      '</div>';

    if (total === 0) {
      html += '<p class="lane-empty">' + (search ? "No matches." : "Nothing here right now.") + '</p>';
    } else {
      for (const bucket of BUCKETS) {
        const list = board[key][bucket.key];
        if (!list.length) continue;
        html += '<div class="bucket">' +
          '<div class="bucket-title" style="color:' + bucket.color + ';background:' + bucket.bg + '">' +
            bucket.label + ' (' + list.length + ')</div>' +
          '<div class="rows">';
        for (const job of list) html += rowHtml(job, { showStatus: bucket.key === "open" });
        html += '</div></div>';
      }
    }
    html += '</section>';
  }
  return html;
}

// ---- techs view (Service Calls only: repairs & tune-ups) ----
function renderTechs(search) {
  const svc = allJobs.filter(j => classifyLane(j) === "service");
  const now = Date.now();
  const windowStart = now - STATS_WINDOW_DAYS * 86400000;

  // Build per-tech stats. Multi-tech jobs credit each tech fully.
  const stats = {}; // name -> {runs, ticketSum, ticketCount, unpaid:[], open:[], priority:[]}
  const ensure = (name) => {
    if (!stats[name]) stats[name] = { runs: 0, ticketSum: 0, ticketCount: 0, unpaid: [], open: [], priority: [] };
    return stats[name];
  };

  for (const job of svc) {
    const techs = techList(job);
    const names = techs.length ? techs : ["Unassigned"];
    const done = isDone(job);
    const due = amountDue(job);
    const amt = money(job);
    const d = new Date(jobDate(job) || 0).getTime();

    for (const name of names) {
      const s = ensure(name);
      if (done) {
        if (d >= windowStart) {
          s.runs++;
          if (amt !== null && amt > 0) { s.ticketSum += amt; s.ticketCount++; }
        }
        if (due > 0) {
          s.unpaid.push(job);
          if (isPriority(job)) s.priority.push(job);
        }
      } else if (!isCanceled(job)) {
        s.open.push(job);
        if (isPriority(job)) s.priority.push(job);
      }
    }
  }

  // Sort techs: most priority first, then most open
  const names = Object.keys(stats).sort((a, b) => {
    const sa = stats[a], sb = stats[b];
    return (sb.priority.length - sa.priority.length) || (sb.open.length - sa.open.length) || a.localeCompare(b);
  });

  if (!names.length) return '<p class="lane-empty" style="margin:20px">No service jobs found.</p>';

  // Stats table
  let html = '<div class="stats-wrap"><table class="stats"><thead><tr>' +
    '<th>Tech</th><th style="text-align:right">Jobs Run (' + STATS_WINDOW_DAYS + 'd)</th>' +
    '<th style="text-align:right">Avg Ticket</th>' +
    '<th style="text-align:right">Unpaid</th>' +
    '<th style="text-align:right">Open</th>' +
    '<th style="text-align:right">Priority</th>' +
    '</tr></thead><tbody>';

  for (const name of names) {
    const s = stats[name];
    const avg = s.ticketCount ? s.ticketSum / s.ticketCount : null;
    html += '<tr>' +
      '<td class="tech-name">' + esc(name) + '</td>' +
      '<td class="num">' + s.runs + '</td>' +
      '<td class="num">' + (avg === null ? '\u2014' : fmtMoney(avg)) + '</td>' +
      '<td class="num">' + (s.unpaid.length ? '<span class="warn">' + s.unpaid.length + '</span>' : '0') + '</td>' +
      '<td class="num">' + s.open.length + '</td>' +
      '<td class="num">' + (s.priority.length ? '<span class="warn">' + s.priority.length + '</span>' : '0') + '</td>' +
    '</tr>';
  }
  html += '</tbody></table>' +
    '<p class="stats-note">Service Calls only. Avg ticket excludes $0 jobs. Unpaid = done but balance due. ' +
    'Priority = ' + PRIORITY_DAYS + '+ days old, unpaid, no "Followed Up" tag in Workiz.</p></div>';

  // Per-tech job lists
  for (const name of names) {
    const s = stats[name];
    const followUp = s.unpaid.filter(j => matchesSearch(j, search));
    const open = s.open.filter(j => matchesSearch(j, search));
    if (!followUp.length && !open.length) continue;

    // priority first within each list
    const priFirst = (a, z) => (isPriority(z) - isPriority(a)) || (new Date(jobDate(a) || 0) - new Date(jobDate(z) || 0));
    followUp.sort(priFirst);
    open.sort(priFirst);

    html += '<section class="tech-section">' +
      '<div class="tech-header"><span class="tech-title">' + esc(name) + '</span>' +
      '<span class="tech-sub">' + open.length + ' open \u00b7 ' + followUp.length + ' needing payment</span></div>';

    if (followUp.length) {
      html += '<div class="bucket"><div class="bucket-title" style="color:#7E1D1D;background:#FDEBEB">Needs Follow-Up / Payment (' + followUp.length + ')</div><div class="rows">';
      for (const job of followUp) html += rowHtml(job, { hideTech: true, checkPriority: true, showStatus: true });
      html += '</div></div>';
    }
    if (open.length) {
      html += '<div class="bucket"><div class="bucket-title" style="color:#1D4E7E;background:#EAF2FB">Open Jobs (' + open.length + ')</div><div class="rows">';
      for (const job of open) html += rowHtml(job, { hideTech: true, checkPriority: true, showStatus: true });
      html += '</div></div>';
    }
    html += '</section>';
  }

  return html;
}

// ---- render ----
function render() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  const html = activeLane === "techs" ? renderTechs(search) : renderLanes(search);
  document.getElementById("content").innerHTML = html;
}

// ---- tabs ----
function renderTabs() {
  const tabs = document.getElementById("tabs");
  const keys = ["all", "service", "installs", "projects", "techs"];
  tabs.innerHTML = keys.map(key => {
    const lane = LANES[key];
    const label = key === "all" ? "All" : (key === "techs" ? "Techs" : lane.label);
    const active = activeLane === key;
    const bg = active ? (lane ? lane.accent : "#1C2634") : "";
    return '<button class="tab' + (active ? ' active' : '') + '" data-lane="' + key + '"' +
      (active ? ' style="background:' + bg + '"' : '') + '>' + label + '</button>';
  }).join("");
  tabs.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeLane = btn.dataset.lane;
      renderTabs();
      render();
    });
  });
}

// ---- wire up ----
document.getElementById("refresh-btn").addEventListener("click", () => loadJobs(false));
document.getElementById("search").addEventListener("input", render);
renderTabs();
loadJobs(false);
setInterval(() => loadJobs(true), 60 * 1000);
</script>
</body>
</html>
