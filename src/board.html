<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoffner Dispatch</title>
<style>
  :root {
    --ink: #1F2733;
    --sub: #5C6675;
    --faint: #98A1AF;
    --bg: #F7F8FA;
    --line: #E6E9EE;
    --accent: #E8862E;
    --red: #C0392B;
    --red-bg: #FBEEEC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    padding-bottom: 60px;
  }

  header {
    background: #1C2634;
    color: #fff;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  h1 { font-size: 15px; letter-spacing: 0.12em; font-weight: 800; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #updated { font-size: 12px; color: #9AA7B8; white-space: nowrap; }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #4C9A55; margin-right: 5px; animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #refresh-btn {
    background: transparent; color: #fff; border: 1px solid #46536A; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  #refresh-btn:disabled { opacity: 0.5; }

  nav {
    background: #fff;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 12px;
    overflow-x: auto;
  }
  .tab {
    border: none; background: none; cursor: pointer;
    padding: 12px 14px 10px;
    font-size: 13px; font-weight: 600; color: var(--sub);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 700; }
  .tab .badge {
    display: inline-block; min-width: 18px; text-align: center;
    background: var(--red); color: #fff; border-radius: 9px;
    font-size: 11px; font-weight: 800; padding: 1px 5px; margin-left: 5px;
  }
  #search {
    margin-left: auto;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--line); font-size: 13px; outline: none;
    width: 160px; min-width: 110px;
  }
  #search:focus { border-color: var(--accent); }

  .error-box {
    margin: 20px 18px; background: var(--red-bg); border: 1px solid var(--red);
    border-radius: 8px; padding: 14px 16px; color: var(--red); font-size: 14px;
  }
  .loading-box { padding: 56px 20px; text-align: center; color: var(--faint); font-size: 14px; }

  /* Summary strip */
  .summary-strip {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin: 16px 18px 0;
  }
  .strip-card {
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 16px; flex: 1 1 140px;
  }
  .strip-num { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .strip-num.red { color: var(--red); }
  .strip-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sub); margin-top: 2px; }

  .section { margin: 22px 18px 0; }
  .section-title {
    font-size: 13px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink); display: flex; align-items: baseline; gap: 8px;
  }
  .section-title .count { font-size: 12px; font-weight: 600; color: var(--faint); }
  .section-empty { color: var(--faint); font-size: 13px; margin-top: 8px; }

  .group-label {
    font-size: 12px; font-weight: 800;
    color: var(--ink); margin: 14px 0 6px 2px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .group-label .n { color: var(--faint); font-weight: 600; font-size: 11px; }

  .rows {
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden;
  }
  .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(90px, auto) 84px 62px;
    gap: 4px 14px;
    align-items: center;
    padding: 9px 14px;
    border-top: 1px solid #F1F3F6;
  }
  .row:first-child { border-top: none; }
  .row.priority { box-shadow: inset 3px 0 0 var(--red); background: #FFFCFB; }

  .cell-main { min-width: 0; }
  .client {
    font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .addr {
    font-size: 12px; color: var(--sub); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status-pill {
    display: inline-block; font-size: 11px; font-weight: 700;
    background: #EEF1F5; color: var(--sub);
    border-radius: 4px; padding: 1px 7px;
  }
  .cell-tech {
    font-size: 12px; font-weight: 700; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-align: right;
  }
  .cell-tech.none { color: var(--red); }
  .cell-money { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cell-money .due { display: block; font-size: 11px; color: var(--red); font-weight: 700; }
  .cell-money.zero { color: var(--faint); font-weight: 500; }
  .cell-date {
    text-align: right; font-size: 12px; color: var(--faint);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .cell-date .old { color: var(--red); font-weight: 700; }
  .pri-badge {
    display: inline-block; vertical-align: 1px;
    font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
    background: var(--red); color: #fff; border-radius: 3px; padding: 1px 5px; margin-right: 6px;
  }

  details.collapsed-list { margin: 14px 0 0; }
  details.collapsed-list summary {
    cursor: pointer; font-size: 12px; font-weight: 700; color: var(--sub);
    padding: 4px 2px; list-style: none;
  }
  details.collapsed-list summary::before { content: "\25B8 "; }
  details.collapsed-list[open] summary::before { content: "\25BE "; }
  details.collapsed-list .rows { margin-top: 6px; }

  /* KPIs */
  .window-toggle {
    display: flex; margin: 18px 18px 0;
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden; width: fit-content;
    background: #fff;
  }
  .window-toggle button {
    border: none; background: none; cursor: pointer;
    padding: 8px 16px; font-size: 12px; font-weight: 700; color: var(--sub);
  }
  .window-toggle button.active { background: var(--ink); color: #fff; }
  .summary-cards { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 18px 0; }
  .sum-card {
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 16px; flex: 1 1 200px;
  }
  .sum-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sub); }
  .sum-value { font-size: 22px; font-weight: 800; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .sum-n { font-size: 12px; color: var(--faint); font-weight: 600; }

  .stats-wrap { margin: 14px 18px 0; overflow-x: auto; }
  table.stats {
    width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    font-size: 13px;
  }
  table.stats th {
    text-align: right; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sub); padding: 9px 12px; border-bottom: 1px solid var(--line);
    white-space: nowrap; font-weight: 700;
  }
  table.stats th:first-child { text-align: left; }
  table.stats td {
    padding: 9px 12px; border-top: 1px solid #F1F3F6;
    text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  table.stats td:first-child { text-align: left; font-weight: 700; }
  table.stats td .warn { color: var(--red); font-weight: 800; }
  table.stats td .n { color: var(--faint); font-size: 11px; font-weight: 600; }
  .stats-note { font-size: 11px; color: var(--faint); margin: 8px 20px 0; line-height: 1.5; }

  footer { text-align: center; font-size: 11px; color: var(--faint); margin-top: 44px; }

  @media (max-width: 620px) {
    .row {
      grid-template-columns: minmax(0, 1fr) 84px;
      grid-template-areas:
        "main money"
        "tech date";
      row-gap: 2px;
    }
    .cell-main { grid-area: main; }
    .cell-money { grid-area: money; }
    .cell-tech { grid-area: tech; text-align: left; }
    .cell-date { grid-area: date; }
  }
</style>
</head>
<body>

<header>
  <h1>HOFFNER DISPATCH</h1>
  <div class="header-right">
    <span id="updated"></span>
    <button id="refresh-btn">Refresh</button>
  </div>
</header>

<nav>
  <div id="tabs" style="display:flex"></div>
  <input type="text" id="search" placeholder="Search&hellip;" />
</nav>

<div id="content"></div>

<footer>Live from Workiz &middot; refreshes every 60s</footer>

<script>
// ==== RULES — tune to match your Workiz setup ====
const PROJECT_CLIENTS = ["paramount"];
const PROJECT_ADDRESS_REGEX = /\bward\b/i;      // Ward St jobs = Paramount project
const PROJECT_TYPE_KEYWORDS = ["new construction", "construction"];
const INSTALL_TYPE_KEYWORDS = ["install", "replacement", "new system", "changeout", "change out"];
const IN_PROGRESS_STATUSES = ["in progress"];
const SCHEDULED_STATUSES = ["scheduled", "submitted"];
const FOLLOWUP_TAGS = ["followed up", "follow up done", "followup"];
const PRIORITY_DAYS = 30;      // unpaid + this old + no follow-up tag = PRIORITY
const RUNS_WINDOW_DAYS = 30;   // "jobs run" lookback on KPIs
// =================================================

let allJobs = [];
let activeTab = "action";
let statsWindow = "90"; // "90" or "ytd"
let firstLoad = true;

// ---- field helpers ----
function f(job) {
  for (let i = 1; i < arguments.length; i++) {
    const n = arguments[i];
    if (job[n] !== undefined && job[n] !== null && job[n] !== "") return job[n];
    const lower = n.toLowerCase();
    for (const k of Object.keys(job)) {
      if (k.toLowerCase() === lower && job[k] !== null && job[k] !== "") return job[k];
    }
  }
  return "";
}
const jobStatus = (j) => String(f(j, "Status", "SubStatus") || "Unknown").trim();
function clientName(j) {
  const company = f(j, "Company", "CompanyName");
  const person = [f(j, "FirstName"), f(j, "LastName")].filter(Boolean).join(" ");
  if (company && person) return person + " \u2014 " + company;
  return person || company || f(j, "ClientName", "Name") || "Unknown client";
}
const jobAddress = (j) => [f(j, "Address"), f(j, "City")].filter(Boolean).join(", ");
function techList(j) {
  const team = f(j, "Team");
  if (Array.isArray(team)) {
    return team.map(t => typeof t === "string" ? t : (t && (t.Name || t.name)) || "").filter(Boolean);
  }
  const single = f(j, "Tech", "AssignedTo");
  return single ? [String(single)] : [];
}
const techNames = (j) => techList(j).join(", ");
function money(j) {
  const n = parseFloat(f(j, "JobTotalPrice", "TotalPrice", "Total", "SubTotal"));
  return isNaN(n) ? null : n;
}
function amountDue(j) {
  const n = parseFloat(f(j, "JobAmountDue", "AmountDue", "Due", "Balance"));
  return isNaN(n) ? 0 : n;
}
function jobTags(j) {
  const raw = f(j, "Tags", "JobTags");
  let list = [];
  if (Array.isArray(raw)) list = raw.map(t => typeof t === "string" ? t : (t && (t.Name || t.name || t.tag)) || "");
  else if (typeof raw === "string") list = raw.split(",");
  return list.map(t => String(t).toLowerCase().trim()).filter(Boolean);
}
const hasFollowUp = (j) => jobTags(j).some(t => FOLLOWUP_TAGS.includes(t));
function fmtMoney(n) {
  if (n === null) return "\u2014";
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function formatDate(raw) {
  if (!raw) return "";
  const d = new Date(raw);
  if (isNaN(d.getTime())) return String(raw);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function daysAgo(raw) {
  if (!raw) return null;
  const d = new Date(raw);
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}
const jobDate = (j) => f(j, "JobDateTime", "CreatedDate");

function windowStart() {
  if (statsWindow === "ytd") return new Date(new Date().getFullYear(), 0, 1).getTime();
  return Date.now() - 90 * 86400000;
}
const windowLabel = () => statsWindow === "ytd" ? "YTD" : "90d";

// ---- classification ----
function classifyLane(job) {
  const name = clientName(job).toLowerCase();
  const type = String(f(job, "JobType")).toLowerCase();
  const addr = jobAddress(job);
  if (
    PROJECT_CLIENTS.some(c => name.includes(c)) ||
    PROJECT_ADDRESS_REGEX.test(addr) ||
    PROJECT_TYPE_KEYWORDS.some(k => type.includes(k))
  ) return "projects";
  if (INSTALL_TYPE_KEYWORDS.some(k => type.includes(k))) return "installs";
  return "service";
}
const isCanceled = (j) => jobStatus(j).toLowerCase().includes("cancel");
const isFinished = (j) => {
  const s = jobStatus(j).toLowerCase();
  return s.includes("done") || s.includes("complet") || s.includes("cancel");
};
const isDone = (j) => isFinished(j) && !isCanceled(j);
const isInProgress = (j) => IN_PROGRESS_STATUSES.includes(jobStatus(j).toLowerCase());
const isScheduledStatus = (j) => SCHEDULED_STATUSES.includes(jobStatus(j).toLowerCase());

// A job "needs action" if it's not done/canceled AND either
// its date has passed, or it sits in a custom follow-up status
// (anything that isn't plain scheduled/submitted/in progress)
function needsAction(j) {
  if (isFinished(j)) return false;
  const age = daysAgo(jobDate(j));
  const pastDue = age !== null && age >= 1;
  const followUpStatus = !isScheduledStatus(j) && !isInProgress(j);
  return pastDue || followUpStatus;
}
function isPriority(j) {
  const age = daysAgo(jobDate(j));
  return age !== null && age >= PRIORITY_DAYS && amountDue(j) > 0 && !hasFollowUp(j);
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ---- fetch ----
async function loadJobs(silent) {
  const btn = document.getElementById("refresh-btn");
  if (!silent) {
    btn.disabled = true;
    btn.textContent = "\u2026";
    if (firstLoad) {
      document.getElementById("content").innerHTML =
        '<div class="loading-box">Pulling live from Workiz\u2026<br><span style="font-size:12px">first load can take ~30s if the server is waking up</span></div>';
    }
  }
  try {
    const res = await fetch("https://workiz-mcp-server.onrender.com/api/jobs");
    if (!res.ok) {
      let detail = "";
      try { detail = (await res.json()).error || ""; } catch (e) {}
      throw new Error("Server returned " + res.status + ". " + detail);
    }
    const body = await res.json();
    const jobs = Array.isArray(body.jobs) ? body.jobs : (Array.isArray(body.data) ? body.data : []);
    if (jobs.length === 0) throw new Error("The server responded but returned zero jobs.");
    allJobs = jobs;
    firstLoad = false;
    const now = new Date();
    document.getElementById("updated").innerHTML =
      '<span class="live-dot"></span>' +
      now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    renderTabs();
    render();
  } catch (err) {
    if (!silent || firstLoad) {
      document.getElementById("content").innerHTML =
        '<div class="error-box"><strong>Couldn\u2019t load the board.</strong> ' + esc(err.message) + '</div>';
    }
  } finally {
    btn.disabled = false;
    btn.textContent = "Refresh";
  }
}

// ---- shared row ----
function rowHtml(job, opts) {
  opts = opts || {};
  const tech = techNames(job);
  const amt = money(job);
  const due = amountDue(job);
  const created = jobDate(job);
  const age = daysAgo(created);
  const status = jobStatus(job);
  const pri = opts.checkPriority && isPriority(job);
  const showOld = !isFinished(job) && age !== null && age > 14;

  return '<div class="row' + (pri ? ' priority' : '') + '">' +
    '<div class="cell-main">' +
      '<div class="client">' + (pri ? '<span class="pri-badge">PRIORITY</span>' : '') + esc(clientName(job)) + '</div>' +
      '<div class="addr">' +
        (opts.showStatus ? '<span class="status-pill">' + esc(status) + '</span> ' : '') +
        esc(jobAddress(job)) +
      '</div>' +
    '</div>' +
    (opts.hideTech
      ? '<div class="cell-tech"></div>'
      : (tech
        ? '<div class="cell-tech">' + esc(tech) + '</div>'
        : '<div class="cell-tech none">Unassigned</div>')) +
    '<div class="cell-money' + (amt === null || amt === 0 ? ' zero' : '') + '">' + fmtMoney(amt) +
      (due > 0 ? '<span class="due">due ' + fmtMoney(due) + '</span>' : '') +
    '</div>' +
    '<div class="cell-date">' + esc(formatDate(created)) +
      (showOld ? '<br><span class="old">' + age + 'd</span>' : '') +
    '</div>' +
  '</div>';
}

function matchesSearch(j, search) {
  if (!search) return true;
  const hay = [clientName(j), jobAddress(j), jobStatus(j), techNames(j),
    String(f(j, "SerialId", "UUID", "JobId")), String(f(j, "JobType"))
  ].join(" ").toLowerCase();
  return hay.includes(search);
}

// ---- ACTION TAB ----
function actionData() {
  const attention = allJobs.filter(needsAction);
  const owesDone = allJobs.filter(j => isDone(j) && amountDue(j) > 0);
  const owesUpcoming = allJobs.filter(j => !isFinished(j) && amountDue(j) > 0 && !needsAction(j));
  const totalDue = owesDone.reduce((sum, j) => sum + amountDue(j), 0);
  return { attention, owesDone, owesUpcoming, totalDue };
}

function renderAction(search) {
  const { attention, owesDone, owesUpcoming, totalDue } = actionData();

  const att = attention.filter(j => matchesSearch(j, search));
  const owed = owesDone.filter(j => matchesSearch(j, search));
  const upcoming = owesUpcoming.filter(j => matchesSearch(j, search));

  let html =
    '<div class="summary-strip">' +
      '<div class="strip-card"><div class="strip-num' + (attention.length ? ' red' : '') + '">' + attention.length + '</div><div class="strip-label">Need Action</div></div>' +
      '<div class="strip-card"><div class="strip-num' + (owesDone.length ? ' red' : '') + '">' + owesDone.length + '</div><div class="strip-label">Owe Money</div></div>' +
      '<div class="strip-card"><div class="strip-num">' + fmtMoney(totalDue) + '</div><div class="strip-label">Outstanding</div></div>' +
    '</div>';

  // --- Needs Attention, grouped by tech ---
  html += '<section class="section"><div class="section-title">Needs Attention <span class="count">' + att.length + '</span></div>';

  if (!att.length) {
    html += '<p class="section-empty">' + (search ? "No matches." : "Nothing overdue or waiting. Clean board.") + '</p>';
  } else {
    const byTech = {};
    for (const job of att) {
      const techs = techList(job);
      const name = techs.length ? techs[0] : "Unassigned";
      (byTech[name] = byTech[name] || []).push(job);
    }
    const techOrder = Object.keys(byTech).sort((a, b) =>
      (byTech[b].length - byTech[a].length) || a.localeCompare(b));
    const byAge = (a, z) => new Date(jobDate(a) || 0) - new Date(jobDate(z) || 0);

    for (const name of techOrder) {
      const list = byTech[name].sort(byAge);
      html += '<div class="group-label">' + esc(name) + ' <span class="n">' + list.length + '</span></div><div class="rows">';
      for (const job of list) html += rowHtml(job, { hideTech: true, showStatus: true, checkPriority: true });
      html += '</div>';
    }
  }
  html += '</section>';

  // --- Owes Money (completed jobs) ---
  html += '<section class="section"><div class="section-title">Owes Money <span class="count">' + owed.length + '</span></div>';

  if (!owed.length) {
    html += '<p class="section-empty">' + (search ? "No matches." : "No completed jobs with balances.") + '</p>';
  } else {
    owed.sort((a, z) =>
      (isPriority(z) - isPriority(a)) ||
      (new Date(jobDate(a) || 0) - new Date(jobDate(z) || 0)));
    html += '<div class="rows" style="margin-top:10px">';
    for (const job of owed) html += rowHtml(job, { showStatus: false, checkPriority: true });
    html += '</div>';
  }

  // --- Upcoming with balances, collapsed ---
  if (upcoming.length) {
    upcoming.sort((a, z) => new Date(jobDate(a) || 0) - new Date(jobDate(z) || 0));
    html += '<details class="collapsed-list"><summary>Upcoming jobs with balances (' + upcoming.length + ')</summary><div class="rows">';
    for (const job of upcoming) html += rowHtml(job, { showStatus: true });
    html += '</div></details>';
  }
  html += '</section>';

  return html;
}

// ---- SCHEDULE TAB ----
const LANES = {
  service:  { label: "Service Calls" },
  installs: { label: "Installs" },
  projects: { label: "Projects" },
};

function renderSchedule(search) {
  // Only clean scheduled / in-progress work; action items live on the Action tab
  const visible = allJobs.filter(j => !isFinished(j) && !needsAction(j) && matchesSearch(j, search));

  const board = { service: { inprogress: [], scheduled: [] }, installs: { inprogress: [], scheduled: [] }, projects: { inprogress: [], scheduled: [] } };
  for (const job of visible) {
    board[classifyLane(job)][isInProgress(job) ? "inprogress" : "scheduled"].push(job);
  }
  const byDate = (a, z) => new Date(jobDate(a) || 0) - new Date(jobDate(z) || 0);
  for (const lane of Object.values(board)) for (const list of Object.values(lane)) list.sort(byDate);

  let html = "";
  for (const key of ["service", "installs", "projects"]) {
    const lane = board[key];
    const total = lane.inprogress.length + lane.scheduled.length;
    html += '<section class="section"><div class="section-title">' + LANES[key].label + ' <span class="count">' + total + '</span></div>';
    if (!total) {
      html += '<p class="section-empty">' + (search ? "No matches." : "Nothing scheduled.") + '</p>';
    } else {
      if (lane.inprogress.length) {
        html += '<div class="group-label">In Progress <span class="n">' + lane.inprogress.length + '</span></div><div class="rows">';
        for (const job of lane.inprogress) html += rowHtml(job, {});
        html += '</div>';
      }
      if (lane.scheduled.length) {
        html += '<div class="group-label">Scheduled <span class="n">' + lane.scheduled.length + '</span></div><div class="rows">';
        for (const job of lane.scheduled) html += rowHtml(job, {});
        html += '</div>';
      }
    }
    html += '</section>';
  }
  return html;
}

// ---- KPIs TAB ----
function avgOf(jobs) {
  let sum = 0, n = 0;
  for (const j of jobs) {
    const amt = money(j);
    if (amt !== null && amt > 0) { sum += amt; n++; }
  }
  return { avg: n ? sum / n : null, n };
}

function renderKpis() {
  const wStart = windowStart();
  const now = Date.now();
  const runsStart = now - RUNS_WINDOW_DAYS * 86400000;
  const inWindow = (j) => new Date(jobDate(j) || 0).getTime() >= wStart;

  const svc = allJobs.filter(j => classifyLane(j) === "service");
  const inst = allJobs.filter(j => classifyLane(j) === "installs");

  const svcAvg = avgOf(svc.filter(j => isDone(j) && inWindow(j)));
  const instAvg = avgOf(inst.filter(j => isDone(j) && inWindow(j)));

  const stats = {};
  const ensure = (name) => {
    if (!stats[name]) stats[name] = { runs: 0, ticket: [], unpaid: 0, open: 0, priority: 0 };
    return stats[name];
  };

  for (const job of svc) {
    const techs = techList(job);
    const names = techs.length ? techs : ["Unassigned"];
    const done = isDone(job);
    const due = amountDue(job);
    const d = new Date(jobDate(job) || 0).getTime();
    for (const name of names) {
      const s = ensure(name);
      if (done) {
        if (d >= runsStart) s.runs++;
        if (inWindow(job)) s.ticket.push(job);
        if (due > 0) { s.unpaid++; if (isPriority(job)) s.priority++; }
      } else if (!isCanceled(job)) {
        s.open++;
        if (isPriority(job)) s.priority++;
      }
    }
  }

  const names = Object.keys(stats).sort((a, b) => (stats[b].runs - stats[a].runs) || a.localeCompare(b));

  let html =
    '<div class="window-toggle">' +
      '<button data-window="90" class="' + (statsWindow === "90" ? 'active' : '') + '">Last 90 Days</button>' +
      '<button data-window="ytd" class="' + (statsWindow === "ytd" ? 'active' : '') + '">Year to Date</button>' +
    '</div>' +
    '<div class="summary-cards">' +
      '<div class="sum-card"><div class="sum-label">Avg Service Ticket (' + windowLabel() + ')</div>' +
        '<div class="sum-value">' + fmtMoney(svcAvg.avg) + ' <span class="sum-n">&middot; ' + svcAvg.n + ' jobs</span></div></div>' +
      '<div class="sum-card"><div class="sum-label">Avg Residential Install (' + windowLabel() + ')</div>' +
        '<div class="sum-value">' + fmtMoney(instAvg.avg) + ' <span class="sum-n">&middot; ' + instAvg.n + ' jobs</span></div></div>' +
    '</div>';

  html += '<div class="stats-wrap"><table class="stats"><thead><tr>' +
    '<th>Tech</th><th>Jobs Run (' + RUNS_WINDOW_DAYS + 'd)</th>' +
    '<th>Avg Ticket (' + windowLabel() + ')</th>' +
    '<th>Unpaid</th><th>Open</th><th>Priority</th>' +
    '</tr></thead><tbody>';

  for (const name of names) {
    const s = stats[name];
    const t = avgOf(s.ticket);
    html += '<tr>' +
      '<td>' + esc(name) + '</td>' +
      '<td>' + s.runs + '</td>' +
      '<td>' + (t.avg === null ? '\u2014' : fmtMoney(t.avg) + ' <span class="n">(' + t.n + ')</span>') + '</td>' +
      '<td>' + (s.unpaid ? '<span class="warn">' + s.unpaid + '</span>' : '0') + '</td>' +
      '<td>' + s.open + '</td>' +
      '<td>' + (s.priority ? '<span class="warn">' + s.priority + '</span>' : '0') + '</td>' +
    '</tr>';
  }
  html += '</tbody></table></div>' +
    '<p class="stats-note">Avg ticket = all completed jobs in the window, excluding $0 jobs; count in parentheses. ' +
    'Service = repairs &amp; tune-ups. Installs = residential (Paramount project excluded). ' +
    'Priority = ' + PRIORITY_DAYS + '+ days old, unpaid, no \u201CFollowed Up\u201D tag in Workiz.</p>';

  return html;
}

// ---- render ----
function render() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  let html;
  if (activeTab === "action") html = renderAction(search);
  else if (activeTab === "schedule") html = renderSchedule(search);
  else html = renderKpis();
  document.getElementById("content").innerHTML = html;

  if (activeTab === "kpis") {
    document.querySelectorAll(".window-toggle button").forEach(btn => {
      btn.addEventListener("click", () => {
        statsWindow = btn.dataset.window;
        render();
      });
    });
  }
}

// ---- tabs ----
function renderTabs() {
  const tabs = document.getElementById("tabs");
  const actionCount = allJobs.length ? actionData().attention.length : 0;
  const defs = [
    { key: "action", label: "Action" + (actionCount ? ' <span class="badge">' + actionCount + '</span>' : "") },
    { key: "schedule", label: "Schedule" },
    { key: "kpis", label: "KPIs" },
  ];
  tabs.innerHTML = defs.map(d =>
    '<button class="tab' + (activeTab === d.key ? ' active' : '') + '" data-tab="' + d.key + '">' + d.label + '</button>'
  ).join("");
  tabs.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      renderTabs();
      render();
    });
  });
}

// ---- wire up ----
document.getElementById("refresh-btn").addEventListener("click", () => loadJobs(false));
document.getElementById("search").addEventListener("input", render);
renderTabs();
loadJobs(false);
setInterval(() => loadJobs(true), 60 * 1000);
</script>
